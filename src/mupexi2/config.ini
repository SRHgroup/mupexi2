## MuPeXI2 config template
## Copy this file and edit paths for your system, or pass -c /path/to/your.ini

[netMHC]
MHC = /path/to/netMHCpan

[EnsemblVEP]
VEP = /path/to/vep
VEPdir = /path/to/vep_cache

[References]
cDNA = /path/to/cDNA.fa
pep = /path/to/proteome.fa
cosmic = /path/to/cosmic.tsv

[PeptideMatch]
PM = /path/to/pepmatch_db

[LiftOver]
# optional
# fasta = /path/to/genome.fa
# chain = /path/to/liftover.chain
# java8 = /path/to/java
# picard = /path/to/picard.jar
